name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      app:
        description: "App to publish (folder name under apps/)"
        required: false
        default: web
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  APP: ${{ github.event.inputs.app || vars.PAGES_APP || 'web' }}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_GAME_TITLE: ${{ vars.VITE_GAME_TITLE || 'house-manager' }}
      VITE_SITE_URL: ${{ vars.VITE_SITE_URL || format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) }}
      VITE_SITE_DESCRIPTION: ${{ vars.VITE_SITE_DESCRIPTION || 'A mobile-first, local-first household manager. Deployed static to GitHub Pages.' }}
      VITE_OG_IMAGE: ${{ vars.VITE_OG_IMAGE }}
      VITE_AUTHOR_NAME: ${{ vars.VITE_AUTHOR_NAME }}
      VITE_AUTHOR_URL: ${{ vars.VITE_AUTHOR_URL }}
      VITE_TWITTER_HANDLE: ${{ vars.VITE_TWITTER_HANDLE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - id: pages
        uses: actions/configure-pages@v5
        with:
          # Create the Pages site on first run instead of erroring when it
          # isn't enabled yet.
          enablement: true

      - run: bun install --frozen-lockfile

      # Deploy gate: typecheck only. The full lint/test/e2e suite is the
      # pre-push hook's job (`bun run check:fast`), not the deploy path —
      # running it here failed the deploy on intentionally-kept-but-unused
      # workspace packages (fallow dead-code) and on flaky browser e2e.
      - run: bunx turbo run typecheck --filter=@house-manager/${{ env.APP }}

      - name: Build ${{ env.APP }}
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: bun run build --filter=@house-manager/${{ env.APP }}

      - name: Verify SSG output
        run: |
          set -euo pipefail
          dir="apps/${APP}/dist/client"
          test -f "$dir/index.html" || (echo "missing $dir/index.html" && exit 1)
          test -f "$dir/404.html" || (echo "missing $dir/404.html" && exit 1)
          test -f "$dir/.nojekyll" || (echo "missing $dir/.nojekyll" && exit 1)
          echo "SSG output OK at $dir"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/${{ env.APP }}/dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
